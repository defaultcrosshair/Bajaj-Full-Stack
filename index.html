<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL Node Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c2a;
    --border: #2a2a40;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --green: #4dffa0;
    --yellow: #ffd166;
    --red: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: 0 0 24px rgba(124,109,250,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown 0.7s ease both;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(124,109,250,0.15), rgba(250,109,154,0.1));
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 80%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 400;
  }

  /* Input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease both;
  }

  .card-title {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  textarea {
    width: 100%;
    min-height: 130px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }
  textarea:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .hint {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* API URL row */
  .url-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.65s 0.05s ease both;
  }

  .url-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-row input:focus { border-color: var(--accent); }

  /* Submit button */
  .btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(124,109,250,0.35);
    animation: fadeUp 0.7s 0.1s ease both;
    width: 100%;
    justify-content: center;
  }
  .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(124,109,250,0.45); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-label { display: none; }

  /* Error */
  .error-box {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    display: none;
    animation: fadeUp 0.4s ease;
    margin-bottom: 24px;
  }
  .error-box.show { display: block; }

  /* Results */
  #results { display: none; animation: fadeUp 0.5s ease both; }
  #results.show { display: block; }

  /* Summary strip */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
  }
  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Hierarchy cards */
  .section-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .hierarchy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .h-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .h-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .h-card.cycle { border-color: rgba(255,107,107,0.3); }
  .h-card.cycle:hover { border-color: var(--red); }

  .h-root {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .root-node {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 1.1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    flex-shrink: 0;
  }
  .h-card.cycle .root-node { background: linear-gradient(135deg, var(--red), #ff9966); }
  .root-info { flex: 1; }
  .root-label { font-weight: 700; font-size: 0.95rem; }
  .root-meta { font-size: 0.72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

  .cycle-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.72rem;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Tree viz */
  .tree-view {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    line-height: 1.8;
    margin-top: 10px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
  }
  .tree-node { color: var(--green); font-weight: 500; }
  .tree-connector { color: var(--border); }

  /* Invalid / Duplicate chips */
  .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid;
  }
  .chip.invalid { background: rgba(255,107,107,0.08); border-color: rgba(255,107,107,0.3); color: var(--red); }
  .chip.dup { background: rgba(255,209,102,0.08); border-color: rgba(255,209,102,0.3); color: var(--yellow); }
  .chip.none { color: var(--muted); border-color: var(--border); background: var(--surface2); }

  /* Identity row */
  .identity {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .id-item { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }
  .id-key { color: var(--muted); }
  .id-val { color: var(--accent); font-weight: 500; }

  /* Animations */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(16px);  } to { opacity: 1; transform: none; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">SRM × Bajaj Finserv Health</div>
    <h1>Node Hierarchy<br/>Explorer</h1>
    <p class="subtitle">POST /bfhl · Tree & Cycle Analyzer</p>
  </header>

  <!-- API URL -->
  <div class="url-row">
    <input type="text" id="apiUrl" value="http://localhost:3000/bfhl" placeholder="API base URL, e.g. https://your-app.onrender.com/bfhl" />
  </div>

  <!-- Input -->
  <div class="card" style="animation-delay:0.05s">
    <div class="card-title">// Input — Node Edges</div>
    <textarea id="inputData" placeholder='Enter comma-separated or one-per-line edges, e.g.&#10;A->B, A->C, B->D, C->E, E->F&#10;X->Y, Y->Z, Z->X&#10;hello, 1->2, A->'></textarea>
    <div class="hint">Accepts comma-separated or newline-separated entries.</div>
  </div>

  <button class="btn" id="submitBtn" onclick="submit()">
    <div class="spinner"></div>
    <span class="btn-label">▶ Analyze Hierarchy</span>
  </button>

  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div id="results">

    <!-- Identity -->
    <div class="section-label">// Identity</div>
    <div class="identity" id="identityRow"></div>

    <!-- Summary -->
    <div class="section-label">// Summary</div>
    <div class="summary-strip" id="summaryStrip"></div>

    <!-- Hierarchies -->
    <div class="section-label">// Hierarchies</div>
    <div class="hierarchy-grid" id="hierarchyGrid"></div>

    <!-- Invalid + Duplicates -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px;" id="flagsRow">
      <div class="card">
        <div class="card-title">// Invalid Entries</div>
        <div class="chips-row" id="invalidChips"></div>
      </div>
      <div class="card">
        <div class="card-title">// Duplicate Edges</div>
        <div class="chips-row" id="dupChips"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Tree renderer ─────────────────────────────────────────────────────────────
function renderTree(obj, prefix = '', isLast = true) {
  const keys = Object.keys(obj);
  if (keys.length === 0) return '';
  let html = '';
  keys.forEach((key, i) => {
    const last = i === keys.length - 1;
    const connector = last ? '└── ' : '├── ';
    const childPrefix = prefix + (last ? '    ' : '│   ');
    html += `<div><span class="tree-connector">${prefix}${connector}</span><span class="tree-node">${key}</span></div>`;
    html += renderTree(obj[key], childPrefix, last);
  });
  return html;
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submit() {
  const raw = document.getElementById('inputData').value.trim();
  const url = document.getElementById('apiUrl').value.trim();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorBox');

  err.classList.remove('show');
  document.getElementById('results').classList.remove('show');

  if (!raw) { showError('Please enter at least one edge.'); return; }
  if (!url)  { showError('Please enter the API URL.'); return; }

  // Parse: comma or newline separated
  const data = raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const json = await res.json();
    renderResults(json);
  } catch (e) {
    showError(`API call failed: ${e.message}. Make sure CORS is enabled and the URL is correct.`);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

function renderResults(d) {
  // Identity
  document.getElementById('identityRow').innerHTML = `
    <div class="id-item"><span class="id-key">user_id: </span><span class="id-val">${d.user_id}</span></div>
    <div class="id-item"><span class="id-key">email: </span><span class="id-val">${d.email_id}</span></div>
    <div class="id-item"><span class="id-key">roll: </span><span class="id-val">${d.college_roll_number}</span></div>
  `;

  // Summary
  const s = d.summary;
  document.getElementById('summaryStrip').innerHTML = `
    <div class="stat"><div class="stat-value">${s.total_trees}</div><div class="stat-label">Total Trees</div></div>
    <div class="stat"><div class="stat-value">${s.total_cycles}</div><div class="stat-label">Total Cycles</div></div>
    <div class="stat"><div class="stat-value">${s.largest_tree_root || '—'}</div><div class="stat-label">Largest Tree Root</div></div>
  `;

  // Hierarchies
  const grid = document.getElementById('hierarchyGrid');
  grid.innerHTML = d.hierarchies.map(h => {
    if (h.has_cycle) {
      return `
        <div class="h-card cycle">
          <div class="h-root">
            <div class="root-node">${h.root}</div>
            <div class="root-info">
              <div class="root-label">Root: ${h.root}</div>
              <div class="root-meta">cyclic group</div>
            </div>
          </div>
          <span class="cycle-badge">⟲ cycle detected</span>
        </div>`;
    }
    const treeRoot = Object.keys(h.tree)[0];
    const treeChildren = h.tree[treeRoot] || {};
    return `
      <div class="h-card">
        <div class="h-root">
          <div class="root-node">${h.root}</div>
          <div class="root-info">
            <div class="root-label">Root: ${h.root}</div>
            <div class="root-meta">depth: ${h.depth}</div>
          </div>
        </div>
        <div class="tree-view">
          <div><span class="tree-node">${treeRoot}</span></div>
          ${renderTree(treeChildren)}
        </div>
      </div>`;
  }).join('');

  // Invalid
  const inv = d.invalid_entries;
  document.getElementById('invalidChips').innerHTML = inv.length
    ? inv.map(e => `<span class="chip invalid">${e}</span>`).join('')
    : `<span class="chip none">none</span>`;

  // Duplicates
  const dups = d.duplicate_edges;
  document.getElementById('dupChips').innerHTML = dups.length
    ? dups.map(e => `<span class="chip dup">${e}</span>`).join('')
    : `<span class="chip none">none</span>`;

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
